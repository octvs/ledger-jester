[project]
name = "ledger-jester"
authors = [{ name = "O. C. Taskin", email = "octvs@posteo.de" }]
version = "0.0.1"
dependencies = ["ledger"]
description = "A stripped down fork of ledger-autosync"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project.scripts]
ledger-j = "ledger_jester.cli:run"
ledger-p = "parsers.cli:run"

[project.optional-dependencies]
parsers = ["lxml","pandas", "xlrd"]

[tool.ruff]
line-length = 79

[tool.ruff.lint]
select = ["I"]
ignore-init-module-imports = false
